<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebar Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-display { font-family: 'Outfit', sans-serif; }
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .menu-item.open .submenu { max-height: 500px; transition: max-height 0.4s ease-in; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="flex">
        <!-- Sidebar Mockup -->
        <nav id="sidebar" class="w-64 h-screen bg-slate-100/90 backdrop-blur-2xl border-r border-slate-200/80 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.04)]">
            <div class="sidebar-header h-20 px-6 flex items-center justify-between border-b border-slate-200/60">
                <h3 class="font-display font-bold text-xl text-slate-950 flex items-center m-0 whitespace-nowrap">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center mr-3 shadow-md shadow-indigo-300/50 border border-indigo-400/30">
                        <i data-lucide="activity" class="text-white w-5 h-5"></i>
                    </div>
                    GymApp
                </h3>
            </div>
            <div class="sidebar-content flex-1 overflow-y-auto py-4">
                <ul class="sidebar-menu list-none p-0 m-0">
                    <li class="menu-item px-3 my-1">
                        <a href="#" class="flex items-center px-3 py-2.5 rounded-xl bg-white shadow-sm text-indigo-700 ring-1 ring-slate-200/50 font-medium">
                            <span class="min-w-[30px] mr-2 flex justify-center"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></span>
                            <span class="flex-1">Dashboard</span>
                        </a>
                    </li>
                    <li class="mt-6 mb-2 px-6">
                        <span class="text-xs font-bold text-slate-600 tracking-wider uppercase">Operaciones</span>
                    </li>
                    <li class="menu-item px-3 my-1">
                        <a href="#" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all font-medium">
                            <span class="min-w-[30px] mr-2 flex justify-center"><i data-lucide="users" class="w-5 h-5"></i></span>
                            <span class="flex-1">Socios / Clientes</span>
                        </a>
                    </li>
                    <li class="menu-item px-3 my-1 open">
                        <a href="#" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all font-medium">
                            <span class="min-w-[30px] mr-2 flex justify-center"><i data-lucide="ticket" class="w-5 h-5"></i></span>
                            <span class="flex-1">Suscripciones</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 ml-auto rotate-180"></i>
                        </a>
                        <ul class="submenu list-none p-0 m-0 mt-1 space-y-1" style="max-height: 500px;">
                            <li><a href="#" class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm text-slate-700 hover:text-indigo-600 hover:bg-white">Planes Regulares</a></li>
                            <li><a href="#" class="flex items-center pl-11 pr-3 py-2 rounded-lg text-sm text-indigo-600 font-semibold bg-white">Pases Diarios</a></li>
                        </ul>
                    </li>
                    <li class="mt-6 mb-2 px-6">
                        <span class="text-xs font-bold text-slate-600 tracking-wider uppercase">Administración</span>
                    </li>
                    <li class="menu-item px-3 my-1">
                        <a href="#" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-white hover:shadow-sm hover:text-indigo-600 transition-all font-medium">
                            <span class="min-w-[30px] mr-2 flex justify-center"><i data-lucide="settings" class="w-5 h-5"></i></span>
                            <span class="flex-1">Configuración</span>
                        </a>
                    </li>
                    <li class="menu-item px-3 mt-8">
                        <a href="#" class="flex items-center px-3 py-2.5 rounded-xl text-rose-500 hover:bg-rose-50 transition-colors font-medium">
                            <span class="min-w-[30px] mr-2 flex justify-center"><i data-lucide="log-out" class="w-5 h-5"></i></span>
                            <span class="flex-1">Cerrar Sesión</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content Area Mockup -->
        <div class="flex-1 p-8">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                <h1 class="text-3xl font-bold text-slate-900 mb-4">Vista Previa del Sidebar</h1>
                <p class="text-slate-600">Así es como se ve el sidebar actualmente después de extraerlo a la vista parcial.</p>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
